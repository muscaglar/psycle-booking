<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Connect Psycle Account</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #e94560; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 6px; }
  input[type="email"], input[type="password"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #f0f0f0;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 16px; /* 16px prevents iOS zoom */
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus { border-color: #e94560; }

  .btn {
    display: block;
    width: 100%;
    background: #e94560;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    margin-top: 8px;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    background: #2a0f0f;
    border: 1px solid #4a1a1a;
    color: #e94560;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
    line-height: 1.4;
  }

  .success-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #555; text-decoration: none; }
  .back:hover { color: #888; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚴 Psycle Finder</div>

  <!-- Login form -->
  <div id="sLogin">
    <h1>Sign in to Psycle</h1>
    <p class="sub">Use your Psycle account email and password.</p>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" inputmode="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="loginBtn" class="btn" onclick="doLogin()">Sign in</button>
    <div id="errMsg" class="error"></div>
    <a href="./psycle-finder.html" class="back">← Back to Psycle Finder</a>
  </div>

  <!-- Success -->
  <div id="sDone" style="display:none">
    <div class="success-icon">✅</div>
    <h1>Connected!</h1>
    <p class="sub">Signed in successfully. Taking you back…</p>
    <a href="./psycle-finder.html" class="btn" style="text-decoration:none;margin-top:0">Open Psycle Finder →</a>
  </div>
</div>

<script>
var APP_URL = (function() {
  var href = location.href;
  var base = href.substring(0, href.lastIndexOf('/') + 1);
  return base + 'psycle-finder.html';
})();

var LOGIN_URL = 'https://psycle.codexfit.com/api/v1/customer/auth/login';

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function showError(msg) {
  var el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errMsg').style.display = 'none';
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  hideError();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    var res = await fetch(LOGIN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ email: email, password: password })
    });

    var data = await res.json().catch(function() { return {}; });

    if (res.ok) {
      // Try common token field names
      var token = data.token || data.access_token || data.bearer_token
        || (data.data && (data.data.token || data.data.access_token || data.data.bearer_token));

      if (token) {
        localStorage.setItem('psycle_bearer_token', token);
        document.getElementById('sLogin').style.display = 'none';
        document.getElementById('sDone').style.display = '';
        setTimeout(function() { location.href = APP_URL; }, 1500);
      } else {
        // Login succeeded but token field name unknown — log and show raw
        console.log('[psycle-login] response:', JSON.stringify(data));
        showError('Logged in but could not find token. Check console and report the field name.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    } else {
      var msg = data.message || data.error || data.errors
        || (typeof data === 'string' ? data : null)
        || 'Login failed (' + res.status + ')';
      if (typeof msg === 'object') msg = JSON.stringify(msg);
      showError(msg);
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch (e) {
    showError('Network error — check your connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
