  :root { --bg:#08080a; --panel:#111113; --border:#1e1e24; --input:#19191d; --line:#2a2a32; --text:#f0f0f0; --muted:#888; --dim:#666; --accent:#e94560; --accent-h:#c73650; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
  .brand .word { font-family: 'AppDisplay', -apple-system, sans-serif; font-size: 21px; letter-spacing: 0.05em; color: #fff; text-transform: uppercase; line-height: 1; }
  .brand .word .dot { color: var(--accent); }
  .brand .tag { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }
  h1 { font-size: 21px; font-weight: 600; color: #fff; margin-bottom: 6px; letter-spacing: 0.01em; }
  .sub { font-size: 13px; color: var(--dim); margin-bottom: 26px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 7px; }
  input[type="email"], input[type="password"] {
    width: 100%; background: var(--input); border: 1px solid var(--line); color: var(--text);
    padding: 14px 16px; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    display: block; width: 100%; background: var(--accent); color: #fff; border: none;
    padding: 15px; border-radius: 9999px; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; text-align: center; margin-top: 10px; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--accent-h); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3); color: var(--accent); border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-top: 16px; display: none; line-height: 1.4; }
  .done-wrap { text-align: center; }
  .ok-mark { width: 64px; height: 64px; margin: 0 auto 18px; border-radius: 9999px; background: rgba(233,69,96,0.12); color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--dim); text-decoration: none; }
  .back:hover { color: var(--muted); }
  .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 7px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg width="36" height="22" viewBox="0 0 30 18" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="6" cy="9" r="3.7" stroke="#fff" stroke-width="2"/>
      <circle cx="24" cy="9" r="3.7" stroke="#fff" stroke-width="2"/>
      <path d="M9.7 9c1.7-2.3 3.2-2.3 4.9 0s3.2 2.3 4.9 0" stroke="#e94560" stroke-width="2"/>
    </svg>
    <span class="word">Psync<span class="dot">.</span></span>
    <span class="tag">Psycle Companion</span>
  </div>

  <div id="sLogin">
    <h1>Sign in</h1>
    <p class="sub">Use your Psycle account email and password.</p>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" inputmode="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
    </div>
    <button id="loginBtn" class="btn" onclick="doLogin()">Sign in</button>
    <div id="errMsg" class="error"></div>
    <a href="./psycle-finder.html" class="back">&larr; Back to Psync</a>
  </div>

  <div id="sDone" style="display:none" class="done-wrap">
    <div class="ok-mark"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
    <h1>Connected</h1>
    <p class="sub">Returning to Psync&hellip;</p>
    <a href="./psycle-finder.html" class="btn" style="text-decoration:none;margin-top:0">Open Psync</a>
  </div>
</div>

<script>
var APP_URL = (function() {
  var href = location.href;
  var base = href.substring(0, href.lastIndexOf('/') + 1);
  return base + 'psycle-finder.html';
})();

var LOGIN_URL = 'https://psycle.codexfit.com/api/v1/customer/auth/login';

var MAX_ATTEMPTS = 3;
var COOLDOWN_BASE = 30;
var _failCount = 0;
var _lockedUntil = 0;
var _cooldownInterval = null;

function checkRateLimit() {
  if (Date.now() < _lockedUntil) {
    var secs = Math.ceil((_lockedUntil - Date.now()) / 1000);
    showError('Too many failed attempts. Try again in ' + secs + 's.');
    return false;
  }
  return true;
}

function onLoginFailure() {
  _failCount++;
  if (_failCount >= MAX_ATTEMPTS) {
    var cooldown = COOLDOWN_BASE * Math.pow(2, Math.floor((_failCount - MAX_ATTEMPTS) / MAX_ATTEMPTS));
    _lockedUntil = Date.now() + cooldown * 1000;
    var btn = document.getElementById('loginBtn');
    btn.disabled = true;
    var updateCountdown = function() {
      var secs = Math.ceil((_lockedUntil - Date.now()) / 1000);
      if (secs <= 0) {
        clearInterval(_cooldownInterval);
        btn.disabled = false;
        btn.textContent = 'Sign in';
        hideError();
        return;
      }
      btn.textContent = 'Wait ' + secs + 's';
    };
    updateCountdown();
    _cooldownInterval = setInterval(updateCountdown, 1000);
  }
}

function onLoginSuccess() {
  _failCount = 0;
  _lockedUntil = 0;
  if (_cooldownInterval) clearInterval(_cooldownInterval);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function showError(msg) {
  var el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errMsg').style.display = 'none';
}

async function doLogin() {
  if (!checkRateLimit()) return;

  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  hideError();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in&hellip;';

  try {
    var res = await fetch(LOGIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });

    var data = await res.json().catch(function() { return {}; });

    if (res.ok) {
      var token = data.token || data.access_token || data.bearer_token
        || (data.data && (data.data.token || data.data.access_token || data.data.bearer_token));

      if (token) {
        onLoginSuccess();
        if (window.opener) {
          window.opener.postMessage({ type: 'PSYCLE_LOGIN_TOKEN', token: token }, '*');
        }
        localStorage.setItem('psycle_bearer_token', token);
        document.getElementById('password').value = '';
        document.getElementById('sLogin').style.display = 'none';
        document.getElementById('sDone').style.display = '';
        if (window.opener) {
          setTimeout(function() { window.close(); }, 1200);
        } else {
          setTimeout(function() { location.href = APP_URL; }, 1500);
        }
      } else {
        console.log('[psync-login] response:', JSON.stringify(data));
        showError('Signed in but no token was returned. Check the console and report the field name.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    } else {
      onLoginFailure();
      var msg = data.message || data.error || data.errors
        || (typeof data === 'string' ? data : null)
        || 'Sign in failed (' + res.status + ')';
      if (typeof msg === 'object') msg = JSON.stringify(msg);
      showError(msg);
      if (Date.now() >= _lockedUntil) {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  } catch (e) {
    onLoginFailure();
    showError('Network error. Check your connection and try again.');
    if (Date.now() >= _lockedUntil) {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }
}
</script>
</body>
</html>
